name: Sync to plugins repo

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone plugins repo
        run: |
          git clone https://x-access-token:${{ secrets.PLUGINS_REPO_TOKEN }}@github.com/ordureconnoisseur/plugins.git plugins-repo

      - name: Copy files
        run: |
          mkdir -p plugins-repo/plugins/refract
          cp -r * plugins-repo/plugins/refract/ 2>/dev/null || true
          # Strip dirs that ship only on GitHub (README assets, dev workflows)
          # — keeps install zip lean.
          rm -rf plugins-repo/plugins/refract/.github
          # Strip the cloned plugins-repo that cp -r picked up — leaving it
          # creates an embedded git submodule reference. Refract additionally
          # strips screenshots/ here for install-zip size.
          rm -rf plugins-repo/plugins/refract/plugins-repo
          rm -rf plugins-repo/plugins/refract/screenshots

      - name: Commit and push
        run: |
          cd plugins-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add plugins/refract/
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "sync: refract $(git -C .. rev-parse --short HEAD)"
          git push
